  <text x="1020" y="105" text-anchor="middle" fill="#00ff41" font-family="monospace" font-size="12" font-weight="bold">AI ANALYSIS — Samantha</text>
  <text x="1020" y="125" text-anchor="middle" fill="#2a6b2a" font-family="monospace" font-size="10">Groq LLM (llama-3.3-70b)</text>
  
  <rect x="920" y="140" width="100" height="40" fill="#030a03" stroke="#1a3a1a" rx="3"/>
  <text x="970" y="158" text-anchor="middle" fill="#c8f7c8" font-family="monospace" font-size="9">Analyst Mode</text>
  <text x="970" y="172" text-anchor="middle" fill="#2a6b2a" font-family="monospace" font-size="8">Technical</text>
  
  <rect x="1030" y="140" width="100" height="40" fill="#030a03" stroke="#1a3a1a" rx="3"/>
  <text x="1080" y="158" text-anchor="middle" fill="#c8f7c8" font-family="monospace" font-size="9">CEO Mode</text>
  <text x="1080" y="172" text-anchor="middle" fill="#2a6b2a" font-family="monospace" font-size="8">Executive</text>
  
  <!-- Arrow: AI → Dashboard -->
  <path d="M 1020 200 L 1020 260" stroke="#1a3a1a" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Dashboard Layer -->
  <rect x="300" y="280" width="840" height="280" fill="#050f05" stroke="#0d2b0d" stroke-width="2" rx="8"/>
