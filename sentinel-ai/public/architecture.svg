  <text x="420" y="350" text-anchor="middle" fill="#2a6b2a" font-family="monospace" font-size="10" font-weight="bold">KILL CHAIN</text>
  <rect x="340" y="370" width="40" height="30" fill="#050f05" stroke="#6b7280" rx="2"/>
  <rect x="385" y="370" width="40" height="30" fill="#050f05" stroke="#facc15" rx="2"/>
  <rect x="430" y="370" width="40" height="30" fill="#050f05" stroke="#f97316" rx="2"/>
  <rect x="475" y="370" width="40" height="30" fill="#050f05" stroke="#ef4444" rx="2"/>
  <text x="420" y="430" text-anchor="middle" fill="#1a4a1a" font-family="monospace" font-size="9">5-Stage Progress</text>
  
  <rect x="540" y="330" width="280" height="100" fill="#030a03" stroke="#1a3a1a" rx="4"/>
  <text x="680" y="350" text-anchor="middle" fill="#2a6b2a" font-family="monospace" font-size="10" font-weight="bold">SAMANTHA AI STREAM</text>
  <text x="680" y="380" text-anchor="middle" fill="#c8f7c8" font-family="monospace" font-size="9">Real-time threat analysis</text>
  <text x="680" y="400" text-anchor="middle" fill="#2a6b2a" font-family="monospace" font-size="8">CEO / Analyst Mode Toggle</text>
  
  <rect x="540" y="440" width="280" height="100" fill="#030a03" stroke="#1a3a1a" rx="4"/>
  <text x="680" y="460" text-anchor="middle" fill="#2a6b2a" font-family="monospace" font-size="10" font-weight="bold">INCIDENT FEED</text>
  <rect x="560" y="480" width="240" height="40" fill="#050f05" stroke="#0d2b0d" rx="2"/>
  <text x="680" y="500" text-anchor="middle" fill="#c8f7c8" font-family="monospace" font-size="9">Realtime Updates • Supabase</text>
  <text x="680" y="520" text-anchor="middle" fill="#00ff41" font-family="monospace" font-size="8">SUBSCRIBED ●</text>
  
  <rect x="840" y="330" width="280" height="100" fill="#030a03" stroke="#1a3a1a" rx="4"/>
  <text x="980" y="350" text-anchor="middle" fill="#2a6b2a" font-family="monospace" font-size="10" font-weight="bold">DECISION PANEL</text>
  <rect x="860" y="370" width="70" height="40" fill="#0a1a0a" stroke="#00ff41" rx="2"/>
  <text x="895" y="390" text-anchor="middle" fill="#00ff41" font-family="monospace" font-size="8">ISOLATE</text>
  <rect x="945" y="370" width="70" height="40" fill="#0a1a0a" stroke="#facc15" rx="2"/>
  <text x="980" y="390" text-anchor="middle" fill="#facc15" font-family="monospace" font-size="8">ESCALATE</text>
  <rect x="1030" y="370" width="70" height="40" fill="#0a1a0a" stroke="#ef4444" rx="2"/>
  <text x="1065" y="390" text-anchor="middle" fill="#ef4444" font-family="monospace" font-size="8">DISMISS</text>
  
  <rect x="840" y="440" width="280" height="100" fill="#030a03" stroke="#1a3a1a" rx="4"/>
  <text x="980" y="460" text-anchor="middle" fill="#2a6b2a" font-family="monospace" font-size="10" font-weight="bold">RESPONSE PLAYBOOK</text>
  <text x="980" y="490" text-anchor="middle" fill="#c8f7c8" font-family="monospace" font-size="9">Dynamic steps per threat</text>
  <text x="980" y="510" text-anchor="middle" fill="#2a6b2a" font-family="monospace" font-size="8">Checklist with progress</text>
  
  <!-- Legend -->
  <rect x="50" y="530" width="1090" height="40" fill="#030a03" stroke="#0d2b0d" rx="4"/>
  <text x="70" y="555" fill="#2a6b2a" font-family="monospace" font-size="10">MITRE ATT&CK: T1046 (Discovery) | T1110 (Credential Access) | T1059.001 (Execution) | T1021 (Lateral Movement) | T1041 (Exfiltration)</text>
  
  <!-- Data Flow Label -->
  <text x="600" y="265" text-anchor="middle" fill="#1a4a1a" font-family="monospace" font-size="10">← Realtime WebSocket Connection →</text>
</svg>
