<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" style="background:#020902">
  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" fill="#00ff41" font-family="monospace" font-size="20" font-weight="bold">SENTINEL AI — System Architecture</text>
  
  <!-- Signal Sources Layer -->
  <rect x="50" y="80" width="300" height="120" fill="#030a03" stroke="#0d2b0d" stroke-width="2" rx="8"/>
  <text x="200" y="105" text-anchor="middle" fill="#2a6b2a" font-family="monospace" font-size="12" font-weight="bold">SIGNAL SOURCES</text>
  
  <rect x="70" y="120" width="80" height="60" fill="#050f05" stroke="#1a3a1a" rx="4"/>
  <text x="110" y="140" text-anchor="middle" fill="#00ff41" font-family="monospace" font-size="10">Network</text>
  <text x="110" y="155" text-anchor="middle" fill="#2a6b2a" font-family="monospace" font-size="9">Logs</text>
  <text x="110" y="170" text-anchor="middle" fill="#facc15" font-family="monospace" font-size="8">T1046</text>
  
  <rect x="160" y="120" width="80" height="60" fill="#050f05" stroke="#1a3a1a" rx="4"/>
  <text x="200" y="140" text-anchor="middle" fill="#00ff41" font-family="monospace" font-size="10">Endpoint</text>
  <text x="200" y="155" text-anchor="middle" fill="#2a6b2a" font-family="monospace" font-size="9">EDR</text>
  <text x="200" y="170" text-anchor="middle" fill="#f97316" font-family="monospace" font-size="8">T1059</text>
  
  <rect x="250" y="120" width="80" height="60" fill="#050f05" stroke="#1a3a1a" rx="4"/>
  <text x="290" y="140" text-anchor="middle" fill="#00ff41" font-family="monospace" font-size="10">Application</text>
  <text x="290" y="155" text-anchor="middle" fill="#2a6b2a" font-family="monospace" font-size="9">API Logs</text>
  <text x="290" y="170" text-anchor="middle" fill="#facc15" font-family="monospace" font-size="8">T1110</text>
  
  <!-- Arrow: Sources → Supabase -->
  <path d="M 350 140 L 420 140" stroke="#1a3a1a" stroke-width="2" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a3a1a"/>
    </marker>
  </defs>
  
  <!-- Supabase Layer -->
  <rect x="420" y="80" width="200" height="120" fill="#0a1a0a" stroke="#00ff41" stroke-width="2" rx="8"/>
  <text x="520" y="105" text-anchor="middle" fill="#00ff41" font-family="monospace" font-size="12" font-weight="bold">SUPABASE</text>
  <text x="520" y="125" text-anchor="middle" fill="#2a6b2a" font-family="monospace" font-size="10">Postgres + Realtime</text>
  
  <rect x="440" y="140" width="50" height="40" fill="#030a03" stroke="#1a3a1a" rx="3"/>
  <text x="465" y="160" text-anchor="middle" fill="#c8f7c8" font-family="monospace" font-size="9">attacks</text>
  
  <rect x="500" y="140" width="50" height="40" fill="#030a03" stroke="#1a3a1a" rx="3"/>
  <text x="525" y="160" text-anchor="middle" fill="#c8f7c8" font-family="monospace" font-size="9">incidents</text>
  
  <rect x="560" y="140" width="50" height="40" fill="#030a03" stroke="#1a3a1a" rx="3"/>
  <text x="585" y="160" text-anchor="middle" fill="#c8f7c8" font-family="monospace" font-size="9">audit_log</text>
  
  <!-- Arrow: Supabase → Correlation -->
  <path d="M 620 140 L 680 140" stroke="#1a3a1a" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Correlation Engine -->
  <rect x="680" y="80" width="160" height="120" fill="#050f05" stroke="#facc15" stroke-width="2" rx="8"/>
  <text x="760" y="105" text-anchor="middle" fill="#facc15" font-family="monospace" font-size="12" font-weight="bold">CORRELATION</text>
  <text x="760" y="125" text-anchor="middle" fill="#2a6b2a" font-family="monospace" font-size="10">5-Stage Kill Chain</text>
  
  <rect x="700" y="140" width="120" height="40" fill="#030a03" stroke="#1a3a1a" rx="3"/>
  <text x="760" y="158" text-anchor="middle" fill="#c8f7c8" font-family="monospace" font-size="9">RECON → EXFIL</text>
  <text x="760" y="172" text-anchor="middle" fill="#facc15" font-family="monospace" font-size="8">T1046 → T1041</text>
  
  <!-- Arrow: Correlation → AI -->
