<html lang="en">

  <style>
    /* PREMIUM CYBERPUNK THEME */
    :root {
      --blood: #00f0ff; /* Neon Cyan */
      --blood-glow: rgba(0, 240, 255, 0.5);
      --dark-blood: #8b5cf6; /* Electric Purple */
      --abyss: #030014;
      --slate: rgba(15, 23, 42, 0.6);
      --font-mono: 'JetBrains Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background-color: var(--abyss);
      color: var(--blood);
      font-family: var(--font-mono);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(139, 92, 246, 0.15), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(0, 240, 255, 0.15), transparent 25%),
        linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
      background-size: 100% 100%, 100% 100%, 30px 30px, 30px 30px;
      overflow-x: hidden;
    }

    /* Scanline effect */
    body::before {
      content: " ";
      display: block;
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(0, 240, 255, 0.04), rgba(139, 92, 246, 0.02), rgba(0, 240, 255, 0.04));
      z-index: 999;
      background-size: 100% 2px, 3px 100%;
      pointer-events: none;
    }

    @keyframes glitch {
      0% { transform: translate(0) }
      20% { transform: translate(-1px, 1px) }
      40% { transform: translate(-1px, -1px) }
      60% { transform: translate(1px, 1px) }
      80% { transform: translate(1px, -1px) }
      100% { transform: translate(0) }
    }

    .glitch-hover:hover {
      animation: glitch 0.25s cubic-bezier(.25, .46, .45, .94) both infinite;
      text-shadow: 2px 2px var(--dark-blood), -2px -2px #ff00ea;
    }

    .header-box {
      text-align: center;
      margin-bottom: 2.5rem;
      position: relative;
    }

    .logo-text {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 0.3em;
      color: #fff;
      text-shadow: 0 0 20px var(--blood), 0 0 40px var(--dark-blood);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-dot {
      width: 16px;
      height: 16px;
      background: var(--blood);
      box-shadow: 0 0 20px var(--blood), 0 0 40px var(--blood);
      display: inline-block;
      margin-right: 18px;
      clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
      animation: pulse 1.5s infinite alternate;
    }

    @keyframes pulse {
      from { opacity: 0.6; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1.15); box-shadow: 0 0 30px var(--blood); }
    }

    .subtitle {
      font-size: 11px;
      color: #a78bfa;
      letter-spacing: 0.3em;
      margin-top: 10px;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(139, 92, 246, 0.5);
    }

    /* Terminal Window Style */
    .card {
      background: var(--slate);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 240, 255, 0.3);
      box-shadow: 0 0 30px rgba(0, 240, 255, 0.1), inset 0 0 20px rgba(139, 92, 246, 0.1);
      width: 100%;
      max-width: 650px;
      position: relative;
      border-radius: 4px;
    }

    /* Crosshairs corners */
    .card::before, .card::after {
      content: ''; position: absolute; width: 15px; height: 15px; border-color: var(--blood); border-style: solid;
    }
    .card::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .card::after { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    .crosshair-tl { position: absolute; top: -1px; right: -1px; width: 15px; height: 15px; border-top: 2px solid var(--blood); border-right: 2px solid var(--blood); }
    .crosshair-bl { position: absolute; bottom: -1px; left: -1px; width: 15px; height: 15px; border-bottom: 2px solid var(--blood); border-left: 2px solid var(--blood); }

    .tabs {
      display: flex;
      border-bottom: 1px solid rgba(0, 240, 255, 0.2);
      background: rgba(0, 0, 0, 0.5);
    }

    .tab {
      flex: 1;
      padding: 16px 10px;
      text-align: center;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.15em;
      cursor: pointer;
      color: #6b7280;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }

    .tab:hover {
      color: var(--blood);
      background: rgba(0, 240, 255, 0.05);
    }

    .tab.active {
      color: #fff;
      background: rgba(139, 92, 246, 0.2);
      box-shadow: inset 0 2px 0 var(--blood);
      text-shadow: 0 0 10px var(--blood);
    }

    .panel-content {
      padding: 2.5rem;
    }

    .scenario-panel { display: none; }
    .scenario-panel.active { display: block; animation: fade-in 0.4s cubic-bezier(0.4, 0, 0.2, 1); }

    @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    label {
      display: block;
      font-size: 10px;
      color: var(--blood);
      letter-spacing: 0.25em;
      margin-bottom: 10px;
      font-weight: 700;
      text-transform: uppercase;
      text-shadow: 0 0 5px var(--blood-glow);
    }

    input, select {
      width: 100%;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(139, 92, 246, 0.4);
      color: #fff;
      font-family: var(--font-mono);
      font-size: 14px;
      padding: 14px;
      margin-bottom: 24px;
      outline: none;
      transition: all 0.3s ease;
      border-radius: 2px;
    }

    input:focus, select:focus {
      border-color: var(--blood);
      background: rgba(0, 240, 255, 0.05);
      box-shadow: 0 0 15px var(--blood-glow);
    }

    input::placeholder { color: #4b5563; }
    
    select option { background: #030014; color: var(--blood); }

    .btn {
      width: 100%;
      padding: 18px;
      background: rgba(139, 92, 246, 0.1);
      border: 1px solid var(--blood);
      color: var(--blood);
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.3em;
      cursor: pointer;
      text-transform: uppercase;
      position: relative;
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 2px;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0,240,255,0.2), transparent);
      transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .btn:hover::before { left: 100%; }

    .btn:hover:not(:disabled) {
      background: rgba(0, 240, 255, 0.2);
      color: #fff;
      box-shadow: 0 0 20px var(--blood-glow), inset 0 0 10px rgba(0,240,255,0.5);
      border-color: #fff;
    }

    .btn.execute-btn {
      background: rgba(139, 92, 246, 0.15);
      color: #fff;
      border: 2px solid var(--dark-blood);
      text-shadow: 0 0 10px var(--dark-blood);
    }
    .btn.execute-btn:hover:not(:disabled) {
      background: var(--dark-blood);
      color: #fff;
      border-color: #fff;
      box-shadow: 0 0 30px rgba(139, 92, 246, 0.6);
    }

    .btn:disabled { opacity: 0.3; border-style: dashed; cursor: not-allowed; }

    .custom-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

    .result-terminal {
      margin-top: 24px;
      background: rgba(0, 0, 0, 0.6);
      border: 1px dashed rgba(0, 240, 255, 0.3);
      padding: 16px;
      font-size: 13px;
      color: #94a3b8;
      display: none;
      max-height: 250px;
      overflow-y: auto;
      border-radius: 2px;
    }
    
    .result-terminal.visible { display: block; }
    
    .line-success { color: #00ff41; text-shadow: 0 0 10px rgba(0, 255, 65, 0.4); }
    .line-error { color: #ef4444; text-shadow: 0 0 10px rgba(239, 68, 68, 0.4); }
    .line-info { color: #cbd5e1; }
    .line-info::before { content: ">> "; color: var(--blood); }

    .layer-cb {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    input[type="checkbox"] {
      appearance: none;
      width: 18px;
      height: 18px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid var(--blood);
      cursor: pointer;
      position: relative;
      margin: 0;
      transition: all 0.2s;
    }
    input[type="checkbox"]:checked { background: var(--blood); box-shadow: 0 0 10px var(--blood-glow); }
    input[type="checkbox"]:checked::after {
      content: '█';
      position: absolute;
      top: -1px; left: 3px;
      color: #000;
      font-size: 12px;
    }

    .layer-label { font-size: 12px; color: #a78bfa; cursor: pointer; text-transform: uppercase; letter-spacing: 0.1em; }

    .progress-track {
      height: 6px;
      background: rgba(15, 23, 42, 0.8);
      margin-top: 20px;
      display: none;
      position: relative;
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-track.visible { display: block; }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--dark-blood), var(--blood));
      width: 0%;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 0 15px var(--blood);
    }
    .divider { border-top: 1px dashed rgba(139, 92, 246, 0.3); margin: 30px 0; }
    .footer-stats { display: flex; justify-content: space-between; font-size: 11px; color: rgba(139, 92, 246, 0.7); font-weight: 700; letter-spacing: 0.1em; }
  </style>
</head>

    function switchTab(tab) {

      document.querySelectorAll('.scenario-panel').forEach(p => p.classList.remove('active'))
      const tabs = ['preset', 'custom', 'burst']

    const MITRE_MAP = {

      LATERAL_MOVEMENT: { technique: 'T1021', tactic: 'Lateral Movement' },

          { stage: 'INITIAL_ACCESS', threat_type: 'BRUTE_FORCE', severity: 'MEDIUM', confidence: 84, is_false_positive: false, layers_involved: ['network','application'], correlated: false },

      },
      brute_c2: {
        name: 'Dual Vector (Brute + C2)',
        stages: [
          { stage: 'INITIAL_ACCESS', threat_type: 'BRUTE_FORCE', severity: 'HIGH', confidence: 87, is_false_positive: false, layers_involved: ['network','application'], correlated: true },
          { stage: 'EXECUTION', threat_type: 'C2_BEACONING', severity: 'CRITICAL', confidence: 93, is_false_positive: false, layers_involved: ['network','endpoint'], correlated: true },

          { stage: 'EXFILTRATION', threat_type: 'DATA_EXFILTRATION', severity: 'CRITICAL', confidence: 95, is_false_positive: false, layers_involved: ['network','endpoint','application'], correlated: true },

          { stage: 'EXECUTION', threat_type: 'PRIVILEGE_ESCALATION', severity: 'MEDIUM', confidence: 72, is_false_positive: false, layers_involved: ['endpoint'], correlated: false },
          { stage: 'EXFILTRATION', threat_type: 'DATA_EXFILTRATION', severity: 'CRITICAL', confidence: 94, is_false_positive: false, layers_involved: ['network','endpoint','application'], correlated: true },
        ],

    function logToTerminal(id, text, type = 'info') {
      const el = document.getElementById(id);
      el.classList.add('visible');
      const span = document.createElement('div');
      span.className = `line-${type}`;
      if(type==='info') span.textContent = text;
      else span.textContent = `>>> ${text}`;
      el.appendChild(span);
      el.scrollTop = el.scrollHeight;
    }

    async function launchPreset() {
      const judgeName = document.getElementById('judge-name').value.trim() || 'ANONYMOUS_OP'
      const scenarioKey = document.getElementById('scenario-select').value
      const scenario = SCENARIOS[scenarioKey]
      
      const btn = document.querySelector('#preset-panel .btn')
      btn.disabled = true
      btn.textContent = `EXECUTING [${scenarioKey}]...`

      const statusBox = document.getElementById('status-box')
      statusBox.innerHTML = ''
      document.getElementById('progress-wrap').classList.add('visible')

      logToTerminal('status-box', `[SYSTEM] Handshake established. Operator: ${judgeName}`, 'info')
      logToTerminal('status-box', `[SYSTEM] Deploying scenario: ${scenario.name}`, 'info')

      const attackId = crypto.randomUUID()
      await db.from('attacks').insert({ id: attackId, device_id: 'c2-framework' }).then(()=>{}).catch(()=>{})

      if (scenario.fp) {
        logToTerminal('status-box', `[DEPLOY] Injecting decoy: ${scenario.fp.threat_type}`, 'info')
        await db.from('incidents').insert({ attack_id: attackId, ...scenario.fp, layers_involved: scenario.fp.layers_involved || ['network'] })
      }

      for (let i = 0; i < scenario.stages.length; i++) {
        setTimeout(async () => {
          document.getElementById('progress-bar').style.width = `${((i+1)/scenario.stages.length)*100}%`
          const mitre = MITRE_MAP[scenario.stages[i].threat_type] || {}
          logToTerminal('status-box', `[${scenario.stages[i].stage}] Transmitting payload: ${scenario.stages[i].threat_type}`, 'info')
          const nowUTC = new Date().toISOString()

          const { error } = await db.from('incidents').insert({
            attack_id: attackId,
            stage: scenario.stages[i].stage,
            threat_type: scenario.stages[i].threat_type,
            severity: scenario.stages[i].severity,
            mitre_technique: mitre.technique || '',
            mitre_tactic: mitre.tactic || '',
            confidence: scenario.stages[i].confidence,
            is_false_positive: false,
            correlated: scenario.stages[i].correlated,
            layers_involved: scenario.stages[i].layers_involved || ['network'],
            created_at: nowUTC
          })

          if (error) {
            logToTerminal('status-box', `[ERR] Payload failed: ${error.message}`, 'error')
          } else {
            logToTerminal('status-box', `[SUCCESS] ${scenario.stages[i].threat_type} executed.`, 'success')
          }

          if (i === scenario.stages.length - 1) {
            setTimeout(() => {
              btn.textContent = 'PAYLOAD_DELIVERED'
              btn.style.color = '#00ff41'
              btn.style.borderColor = '#00ff41'
              logToTerminal('status-box', `[SYSTEM] Attack sequence complete. Terminating uplink.`, 'success')
              setTimeout(() => {
                btn.disabled = false
                btn.textContent = 'EXECUTE_PAYLOAD()'
                btn.style.color = ''
                btn.style.borderColor = ''
              }, 4000)
            }, 1000)
          }
        }, scenario.delays[i])
      }
    }

    // Auto-mapping: threat type -> kill chain stage, confidence, layers
    const THREAT_DEFAULTS = {
      BRUTE_FORCE:       { stage: 'INITIAL_ACCESS', confidence: 87, layers: ['network','application'] },
      SQL_INJECTION:     { stage: 'INITIAL_ACCESS', confidence: 82, layers: ['application','network'] },
      MALWARE_EXECUTION: { stage: 'EXECUTION',      confidence: 93, layers: ['endpoint','network'] },
      DATA_EXFILTRATION: { stage: 'EXFILTRATION',   confidence: 91, layers: ['network','endpoint','application'] },
      C2_BEACONING:      { stage: 'LATERAL_MOVEMENT', confidence: 88, layers: ['network','endpoint'] },
      PHISHING:          { stage: 'INITIAL_ACCESS', confidence: 78, layers: ['application'] },
    }

    async function launchCustom() {
      const btn = document.querySelector('#custom-panel .btn')
      btn.disabled = true
      btn.textContent = 'INJECTING...'
      
      const threatType = document.getElementById('custom-threat').value
      const severity = document.getElementById('custom-severity').value
      const defaults = THREAT_DEFAULTS[threatType] || { stage: 'EXECUTION', confidence: 85, layers: ['network'] }
      const mitre = MITRE_MAP[threatType] || {}
      const attackId = crypto.randomUUID()

      await db.from('attacks').insert({ id: attackId, device_id: 'c2-framework' }).then(()=>{}).catch(()=>{})

      logToTerminal('custom-result', `[INIT] Preparing ${threatType} payload...`, 'info')

      const nowUTC = new Date().toISOString()
      const incident = {
        attack_id: attackId,
        stage: defaults.stage,
        threat_type: threatType,
        severity: severity,
        confidence: defaults.confidence + Math.floor(Math.random() * 8) - 4,
        mitre_technique: mitre.technique || '',
        mitre_tactic: mitre.tactic || '',
        is_false_positive: false,
        correlated: defaults.layers.length > 1,
        layers_involved: defaults.layers,
        created_at: nowUTC
      }

      const { error } = await db.from('incidents').insert(incident)

      if (error) {
        logToTerminal('custom-result', `[ERR] Inject failed: ${error.message}`, 'error')
      } else {
        logToTerminal('custom-result', `[SUCCESS] ${threatType} injected. Dashboard updated.`, 'success')
      }

      btn.disabled = false
      btn.textContent = 'INJECT_THREAT()'
    }

    async function launchBurst() {
      const count = parseInt(document.getElementById('burst-count').value) || 100
      const rate = parseInt(document.getElementById('burst-rate').value) || 50
      
      const btn = document.querySelector('#burst-panel .btn')
      btn.disabled = true
      btn.textContent = `FLOODING...`

      logToTerminal('burst-result', `[INIT] UDP Flood targeting ingestion pipe (${count} reqs at ${rate} req/s)`, 'info')

      const threats = ['PORT_SCAN', 'BRUTE_FORCE', 'LATERAL_MOVEMENT', 'DATA_EXFILTRATION', 'C2_BEACONING', 'MALWARE_EXECUTION', 'DNS_TUNNELING']
      const stages = ['RECON', 'INITIAL_ACCESS', 'EXECUTION', 'LATERAL_MOVEMENT', 'EXFILTRATION']
      const severities = ['LOW', 'MEDIUM', 'HIGH', 'CRITICAL']
      const attackId = crypto.randomUUID()
      await db.from('attacks').insert({ id: attackId, device_id: 'c2-framework' }).then(()=>{}).catch(()=>{})
      
      const delayMs = Math.max(2, 1000 / rate)
      let sent = 0
      let errors = 0
      const startTime = Date.now()

      for (let i = 0; i < count; i++) {
        const threat = threats[Math.floor(Math.random() * threats.length)]
        const mitre = MITRE_MAP[threat] || {}
        
        const nowUTC = new Date().toISOString()
        const incident = {
          attack_id: attackId,
          stage: stages[Math.floor(Math.random() * stages.length)],
          threat_type: threat,
          severity: severities[Math.floor(Math.random() * severities.length)],
          confidence: 40 + Math.floor(Math.random() * 60),
          mitre_technique: mitre.technique || '',
          mitre_tactic: mitre.tactic || '',
          is_false_positive: Math.random() < 0.05,
          correlated: Math.random() > 0.5,
          layers_involved: ['network', 'endpoint'].slice(0, 1 + Math.floor(Math.random() * 2)),
          created_at: nowUTC
        }

        db.from('incidents').insert(incident).then(({ error }) => {
          if (error) errors++
          sent++
        })

        if (i % 10 === 0) {
          await new Promise(r => setTimeout(r, delayMs * 10))
        }
      }

      await new Promise(r => setTimeout(r, 2000))
      const elapsed = ((Date.now() - startTime) / 1000).toFixed(1)
      
      if (errors === 0) {
        logToTerminal('burst-result', `[SUCCESS] Target swallowed ${sent} packets in ${elapsed}s. Zero drop rate.`, 'success')
      } else {
        logToTerminal('burst-result', `[WARN] Flood complete. Dropped ${errors} packets. Target QoS degraded.`, 'error')
      }

      btn.disabled = false
      btn.textContent = 'INIT_FLOOD_PROTOCOL()'
    }
  </script>
</body>
